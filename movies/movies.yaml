                  registrationDate: "2025-11-28"
                  premium: false
                  birthDate: "1995-03-15"
      responses:
        '201':
          description: Usuario registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                premiumUserCreated:
