                basicUserCreated:
                  summary: Usuario básico creado
                  value:
                    id: 4
                    username: "mdiaz"
                    name: "Marta"
                    surname: "Díaz"
                    email: "mdiaz@example.com"
                    password: "password789"
                    registrationDate: "2025-11-28"
                    premium: false
                    birthDate: "1995-03-15"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /users/{id}:
    get:
      tags:
        - Users
      summary: Devuelve un usuario por ID
      description: Devuelve los datos de un usuario específico
      parameters:
