openapi: 3.0.1
info:
  title: Movies API
  description: API REST para la gestión de películas, actores, usuarios, reseñas, directores y productoras.
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
paths:
  /movies:
    get:
      tags:
        - Movies
      summary: Devuelve la lista de películas
      description: |
        Devuelve una lista con todas las películas disponibles
        
        Se permite filtrar películas por:
          - **genre**: Filtra por género
      parameters:
        - name: genre
          in: query
          description: Filtra por género de la película
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieOutDto'
              examples:
                allMovies:
                  summary: Lista de todas las películas
                  value:
                    - id: 1
                      title: "Catch Me If You Can"
                      synopsis: "A true story about Frank Abagnale Jr."
                      genre: "Action"
                      averageRating: 8.1
                      imageUrl: "https://example.com/catch-me.jpg"
                    - id: 2
                      title: "The Matrix"
                      synopsis: "A hacker discovers the true nature of reality"
                      genre: "Science Fiction"
                      averageRating: 8.7
                      imageUrl: "https://example.com/matrix.jpg"
                actionMovies:
                  summary: Películas filtradas por género Action
                  value:
                    - id: 1
                      title: "Catch Me If You Can"
                      synopsis: "A true story about Frank Abagnale Jr."
                      genre: "Action"
                      averageRating: 8.1
                      imageUrl: "https://example.com/catch-me.jpg"
                    - id: 3
                      title: "Die Hard"
                      synopsis: "A New York cop fights terrorists in LA"
                      genre: "Action"
                      averageRating: 8.2
                      imageUrl: "https://example.com/die-hard.jpg"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      tags:
        - Movies
      summary: Registrar una película
      description: Registra una nueva película
      requestBody:
        description: Los datos de la nueva película
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieInDto'
            examples:
              actionMovie:
                summary: Película de acción
                value:
                  title: "Catch Me If You Can"
                  synopsis: "A true story about Frank Abagnale Jr."
                  releaseDate: "2003-01-24"
                  duration: 141
                  genre: "Action"
                  averageRating: 8.1
                  imageUrl: "https://example.com/catch-me.jpg"
                  studio:
                    id: 1
                  director:
                    id: 1
              sciFiMovie:
                summary: Película de ciencia ficción
                value:
                  title: "Inception"
                  synopsis: "A thief enters dreams to steal secrets"
                  releaseDate: "2010-07-16"
                  duration: 148
                  genre: "Science Fiction"
                  averageRating: 8.8
                  imageUrl: "https://example.com/inception.jpg"
                  studio:
                    id: 1
                  director:
                    id: 2
      responses:
        '201':
          description: Película registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                actionMovieCreated:
                  summary: Película de acción creada
                  value:
                    id: 3
                    title: "Catch Me If You Can"
                    synopsis: "A true story about Frank Abagnale Jr."
                    releaseDate: "2003-01-24"
                    duration: 141
                    genre: "Action"
                    averageRating: 8.1
                    imageUrl: "https://example.com/catch-me.jpg"
                    studio:
                      id: 1
                    director:
                      id: 1
                sciFiMovieCreated:
                  summary: Película de ciencia ficción creada
                  value:
                    id: 4
                    title: "Inception"
                    synopsis: "A thief enters dreams to steal secrets"
                    releaseDate: "2010-07-16"
                    duration: 148
                    genre: "Science Fiction"
                    averageRating: 8.8
                    imageUrl: "https://example.com/inception.jpg"
                    studio:
                      id: 1
                    director:
                      id: 2
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /movies/{id}:
    get:
      tags:
        - Movies
      summary: Devuelve una película por ID
      description: Devuelve los datos de una película específica
      parameters:
        - name: id
          in: path
          description: ID de la película
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                actionMovie:
                  summary: Película de acción
                  value:
                    id: 1
                    title: "Catch Me If You Can"
                    synopsis: "A true story about Frank Abagnale Jr."
                    releaseDate: "2003-01-24"
                    duration: 141
                    genre: "Action"
                    averageRating: 8.1
                    imageUrl: "https://example.com/catch-me.jpg"
                    studio:
                      id: 1
                    director:
                      id: 1
                sciFiMovie:
                  summary: Película de ciencia ficción
                  value:
                    id: 2
                    title: "The Matrix"
                    synopsis: "A hacker discovers the true nature of reality"
                    releaseDate: "1999-03-31"
                    duration: 136
                    genre: "Science Fiction"
                    averageRating: 8.7
                    imageUrl: "https://example.com/matrix.jpg"
                    studio:
                      id: 1
                    director:
                      id: 3
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    put:
      tags:
        - Movies
      summary: Actualizar una película
      description: Actualiza los datos de una película existente
      parameters:
        - name: id
          in: path
          description: ID de la película
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Los datos actualizados de la película
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovieInDto'
            examples:
              updateRating:
                summary: Actualizar rating de película
                value:
                  title: "Catch Me If You Can"
                  synopsis: "A true story about Frank Abagnale Jr."
                  releaseDate: "2003-01-24"
                  duration: 141
                  genre: "Action"
                  averageRating: 8.5
                  imageUrl: "https://example.com/catch-me-updated.jpg"
                  studio:
                    id: 1
                  director:
                    id: 1
              updateGenre:
                summary: Cambiar género de película
                value:
                  title: "The Matrix"
                  synopsis: "A hacker discovers the true nature of reality"
                  releaseDate: "1999-03-31"
                  duration: 136
                  genre: "Thriller"
                  averageRating: 8.7
                  imageUrl: "https://example.com/matrix.jpg"
                  studio:
                    id: 1
                    director:
                      id: 3
      responses:
        '200':
          description: Película actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movie'
              examples:
                ratingUpdated:
                  summary: Rating actualizado
                  value:
                    id: 1
                    title: "Catch Me If You Can"
                    synopsis: "A true story about Frank Abagnale Jr."
                    releaseDate: "2003-01-24"
                    duration: 141
                    genre: "Action"
                    averageRating: 8.5
                    imageUrl: "https://example.com/catch-me-updated.jpg"
                    studio:
                      id: 1
                    director:
                      id: 1
                genreUpdated:
                  summary: Género actualizado
                  value:
                    id: 2
                    title: "The Matrix"
                    synopsis: "A hacker discovers the true nature of reality"
                    releaseDate: "1999-03-31"
                    duration: 136
                    genre: "Thriller"
                    averageRating: 8.7
                    imageUrl: "https://example.com/matrix.jpg"
                    studio:
                      id: 1
                    director:
                      id: 3
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    delete:
      tags:
        - Movies
      summary: Eliminar una película
      description: Elimina una película del sistema
      parameters:
        - name: id
          in: path
          description: ID de la película
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Película eliminada
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /movies/{movieId}/reviews:
    get:
      tags:
        - Movies
      summary: Devuelve las reseñas de una película
      description: Devuelve todas las reseñas asociadas a una película específica
      parameters:
        - name: movieId
          in: path
          description: ID de la película
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewOutDto'
              examples:
                positiveReviews:
                  summary: Reseñas positivas
                  value:
                    - id: 1
                      comment: "An absolutely mind-bending masterpiece!"
                      rating: 10
                      reviewDate: "2025-11-27"
                      recommended: true
                      spoiler: false
                      username: "csevi"
                      movieTitle: "Catch Me If You Can"
                    - id: 2
                      comment: "Great acting and storytelling"
                      rating: 9
                      reviewDate: "2025-11-28"
                      recommended: true
                      spoiler: false
                      username: "mdiaz"
                      movieTitle: "Catch Me If You Can"
                mixedReviews:
                  summary: Reseñas mixtas
                  value:
                    - id: 3
                      comment: "Good movie but too long"
                      rating: 7
                      reviewDate: "2025-11-29"
                      recommended: true
                      spoiler: false
                      username: "jlopez"
                      movieTitle: "The Matrix"
                    - id: 4
                      comment: "Interesting concept but confusing plot"
                      rating: 6
                      reviewDate: "2025-11-30"
                      recommended: false
                      spoiler: true
                      username: "agarcia"
                      movieTitle: "The Matrix"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      tags:
        - Movies
      summary: Crear una reseña para una película
      description: Registra una nueva reseña asociada a una película
      parameters:
        - name: movieId
          in: path
          description: ID de la película
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Los datos de la nueva reseña
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInDto'
            examples:
              positiveReview:
                summary: Reseña positiva
                value:
                  comment: "An absolutely mind-bending masterpiece! The visuals and story are incredible."
                  rating: 10
                  reviewDate: "2025-11-27"
                  recommended: true
                  spoiler: false
                  userId: 1
              criticalReview:
                summary: Reseña crítica
                value:
                  comment: "Decent movie but the ending was disappointing and predictable."
                  rating: 6
                  reviewDate: "2025-11-28"
                  recommended: false
                  spoiler: true
                  userId: 2
      responses:
        '201':
          description: Reseña registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
              examples:
                positiveReviewCreated:
                  summary: Reseña positiva creada
                  value:
                    id: 5
                    comment: "An absolutely mind-bending masterpiece!"
                    rating: 10
                    reviewDate: "2025-11-27"
                    recommended: true
                    spoiler: false
                    user:
                      id: 1
                    movie:
                      id: 1
                criticalReviewCreated:
                  summary: Reseña crítica creada
                  value:
                    id: 6
                    comment: "Decent movie but the ending was disappointing"
                    rating: 6
                    reviewDate: "2025-11-28"
                    recommended: false
                    spoiler: true
                    user:
                      id: 2
                    movie:
                      id: 1
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /actors:
    get:
      tags:
        - Actors
      summary: Devuelve la lista de actores
      description: |
        Devuelve una lista con todos los actores disponibles
        
        Se permite filtrar actores por:
          - **nationality**: Filtra por nacionalidad
      parameters:
        - name: nationality
          in: query
          description: Filtra por nacionalidad del actor
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActorOutDto'
              examples:
                allActors:
                  summary: Lista de todos los actores
                  value:
                    - id: 1
                      name: "Leonardo DiCaprio"
                      nationality: "American"
                      active: true
                      actorType: "Lead"
                    - id: 2
                      name: "Tom Hanks"
                      nationality: "American"
                      active: true
                      actorType: "Lead"
                americanActors:
                  summary: Actores americanos
                  value:
                    - id: 1
                      name: "Leonardo DiCaprio"
                      nationality: "American"
                      active: true
                      actorType: "Lead"
                    - id: 2
                      name: "Tom Hanks"
                      nationality: "American"
                      active: true
                      actorType: "Lead"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    post:
      tags:
        - Actors
      summary: Registrar un actor
      description: Registra un nuevo actor
      requestBody:
        description: Los datos del nuevo actor
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorInDto'
            examples:
              leadActor:
                summary: Actor principal
                value:
                  name: "Leonardo DiCaprio"
                  nationality: "American"
                  birthDate: "1974-11-11"
                  active: true
                  awards: 1
                  biography: "Award-winning American actor"
                  actorType: "Lead"
              supportingActor:
                summary: Actor de reparto
                value:
                  name: "Michael Caine"
                  nationality: "British"
                  birthDate: "1933-03-14"
                  active: true
                  awards: 2
                  biography: "Veteran British actor"
                  actorType: "Supporting"
      responses:
        '201':
          description: Actor registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
              examples:
                leadActorCreated:
                  summary: Actor principal creado
                  value:
                    id: 3
                    name: "Leonardo DiCaprio"
                    nationality: "American"
                    birthDate: "1974-11-11"
                    active: true
                    awards: 1
                    biography: "Award-winning American actor"
                    actorType: "Lead"
                supportingActorCreated:
                  summary: Actor de reparto creado
                  value:
                    id: 4
                    name: "Michael Caine"
                    nationality: "British"
                    birthDate: "1933-03-14"
                    active: true
                    awards: 2
                    biography: "Veteran British actor"
                    actorType: "Supporting"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /actors/{id}:
    get:
      tags:
        - Actors
      summary: Devuelve un actor por ID
      description: Devuelve los datos de un actor específico
      parameters:
        - name: id
          in: path
          description: ID del actor
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
              examples:
                diCaprio:
                  summary: Leonardo DiCaprio
                  value:
                    id: 1
                    name: "Leonardo DiCaprio"
                    nationality: "American"
                    birthDate: "1974-11-11"
                    active: true
                    awards: 1
                    biography: "Award-winning American actor"
                    actorType: "Lead"
                hanks:
                  summary: Tom Hanks
                  value:
                    id: 2
                    name: "Tom Hanks"
                    nationality: "American"
                    birthDate: "1956-07-09"
                    active: true
                    awards: 2
                    biography: "Two-time Academy Award winner"
                    actorType: "Lead"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    put:
      tags:
        - Actors
      summary: Actualizar un actor
      description: Actualiza los datos de un actor existente
      parameters:
        - name: id
          in: path
          description: ID del actor
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Los datos actualizados del actor
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActorInDto'
            examples:
              updateAwards:
                summary: Actualizar premios
                value:
                  name: "Leonardo DiCaprio"
                  nationality: "American"
                  birthDate: "1974-11-11"
                  active: true
                  awards: 2
                  biography: "Oscar-winning actor known for transformative roles"
                  actorType: "Lead"
              updateStatus:
                summary: Cambiar estado activo
                value:
                  name: "Tom Hanks"
                  nationality: "American"
                  birthDate: "1956-07-09"
                  active: false
                  awards: 2
                  biography: "Retired Academy Award winner"
                  actorType: "Lead"
      responses:
        '200':
          description: Actor actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
              examples:
                awardsUpdated:
                  summary: Premios actualizados
                  value:
                    id: 1
                    name: "Leonardo DiCaprio"
                    nationality: "American"
                    birthDate: "1974-11-11"
                    active: true
                    awards: 2
                    biography: "Oscar-winning actor known for transformative roles"
                    actorType: "Lead"
                statusUpdated:
                  summary: Estado actualizado
                  value:
                    id: 2
                    name: "Tom Hanks"
                    nationality: "American"
                    birthDate: "1956-07-09"
                    active: false
                    awards: 2
                    biography: "Retired Academy Award winner"
                    actorType: "Lead"
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
    delete:
      tags:
        - Actors
      summary: Eliminar un actor
      description: Elimina un actor del sistema
      parameters:
        - name: id
          in: path
          description: ID del actor
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Actor eliminado
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
  /users:
